<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="description" content="Live Cricket Scores - T20 World Cup, Test, ODI updates in real-time. India vs New Zealand Final 2026.">
    <meta name="theme-color" content="#0b0f19">
    <title>CricScore Pro | Live Cricket Updates</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0b0f19;
            --surface: rgba(22, 28, 45, 0.85);
            --border: rgba(255,255,255,0.08);
            --accent: #38bdf8;
            --purple: #818cf8;
            --text: #f1f5f9;
            --dim: #94a3b8;
            --red: #ef4444;
            --green: #22c55e;
            --gold: #eab308;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at top left, rgba(56,189,248,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at bottom right, rgba(129,140,248,0.12) 0%, transparent 55%);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* ---- HEADER ---- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11,15,25,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-right {
            font-size: 0.75rem;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .refresh-indicator {
            width: 7px; height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        /* ---- PAGE WRAPPER ---- */
        .page {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding: 14px 14px 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ---- AD BANNER ---- */
        .ad-slot {
            width: 100%;
            background: rgba(15,20,35,0.6);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-align: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            min-height: 80px;
        }
        .ad-slot::before {
            content: 'AD';
            position: absolute;
            top: 5px; left: 8px;
            font-size: 0.55rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 2px;
        }
        .ad-slot.tall { min-height: 250px; }

        /* ---- SCORECARD ---- */
        .card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .card:active { transform: scale(0.99); }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .badge.live { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
        .badge.upcoming { background: rgba(234,179,8,0.1); color: var(--gold); border: 1px solid rgba(234,179,8,0.25); }
        .badge.completed { background: rgba(148,163,184,0.08); color: var(--dim); border: 1px solid rgba(148,163,184,0.2); }
        .live-dot { width:8px; height:8px; background:var(--red); border-radius:50%; animation: pulse 1.4s infinite; }

        .league-name {
            font-size: 0.72rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .match-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 3px;
            line-height: 1.3;
        }
        .match-desc {
            font-size: 0.78rem;
            color: var(--dim);
            margin-bottom: 18px;
        }

        /* ---- TEAMS ---- */
        .teams { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: background 0.2s;
        }
        .team-row.winner { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); }
        .team-left { display: flex; align-items: center; gap: 10px; }
        .team-logo {
            width: 30px; height: 30px;
            object-fit: contain;
            border-radius: 4px;
            background: #fff;
            padding: 2px;
        }
        .team-abbr {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .team-score {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--accent);
        }
        .winner .team-score { color: var(--green); }

        .match-status {
            font-size: 0.85rem;
            color: var(--purple);
            padding-top: 14px;
            border-top: 1px solid var(--border);
            font-weight: 500;
        }

        .players-box {
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 12px;
            font-size: 0.82rem;
            color: var(--dim);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .players-box strong { color: var(--text); }

        /* ---- SECTION TITLE ---- */
        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        /* ---- UPCOMING LIST ---- */
        .upcoming-list { display: flex; flex-direction: column; gap: 8px; }
        .upcoming-card {
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            transition: background 0.2s;
        }
        .upcoming-card:active { background: rgba(255,255,255,0.05); }
        .upcoming-league { font-size: 0.68rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
        .upcoming-name { font-weight: 600; font-size: 0.9rem; color: var(--text); margin-bottom: 3px; }
        .upcoming-status { font-size: 0.78rem; color: var(--purple); }

        /* ---- WHATSAPP BOT INFO BOX (No link, just informational) ---- */
        .info-box {
            background: rgba(37,211,102,0.06);
            border: 1px solid rgba(37,211,102,0.15);
            border-radius: 16px;
            padding: 16px;
        }
        .info-box h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: #25d366;
            margin-bottom: 8px;
        }
        .info-box p {
            font-size: 0.83rem;
            color: var(--dim);
            line-height: 1.6;
        }

        /* ---- LOADING ---- */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            gap: 12px;
            color: var(--dim);
        }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ---- FOOTER ---- */
        footer {
            text-align: center;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.15);
            padding: 20px 16px 0;
        }

        /* ---- ANIMATIONS ---- */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
            70% { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card, .upcoming-card, .info-box { animation: fadeUp 0.4s ease forwards; }

        /* ---- MOBILE TWEAKS ---- */
        @media (max-width: 380px) {
            .team-abbr { font-size: 1.1rem; }
            .team-score { font-size: 1.1rem; }
            .match-name { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<header>
    <span class="logo">🏏 CricScore Pro</span>
    <span class="header-right">
        <span class="refresh-indicator"></span>
        Live · Auto Refresh
    </span>
</header>

<div class="page">

    <!-- TOP BANNER AD -->
    <div id="top-ad" style="width:100%;margin:auto;position:relative;z-index:99998;">
        <iframe data-aa='2429783' src='//acceptable.a-ads.com/2429783/?size=Adaptive'
            style='border:0;padding:0;width:100%;height:auto;overflow:hidden;display:block;margin:auto'></iframe>
    </div>

    <!-- MAIN SCORECARD -->
    <div id="scorecard">
        <div class="loading">
            <div class="spinner"></div>
            <span>Fetching Live Match...</span>
        </div>
    </div>

    <!-- MID BANNER AD -->
    <div id="mid-ad" style="width:100%;margin:auto;position:relative;z-index:99998;">
        <iframe data-aa='2429783' src='//acceptable.a-ads.com/2429783/?size=Adaptive'
            style='border:0;padding:0;width:100%;height:auto;overflow:hidden;display:block;margin:auto'></iframe>
    </div>

    <!-- UPCOMING MATCHES -->
    <div id="upcoming-section" style="display:none;">
        <p class="section-title">Today's Other Matches</p>
        <div class="upcoming-list" id="upcoming-list"></div>
    </div>

    <!-- BOTTOM BANNER AD -->
    <div id="bottom-ad" style="width:100%;margin:auto;position:relative;z-index:99998;">
        <iframe data-aa='2429783' src='//acceptable.a-ads.com/2429783/?size=Adaptive'
            style='border:0;padding:0;width:100%;height:auto;overflow:hidden;display:block;margin:auto'></iframe>
    </div>

    <!-- WHATSAPP INFO (No phone number needed - informational only) -->
    <!-- To enable the WhatsApp bot link, replace with your burner SIM number:
         <a href="https://wa.me/91XXXXXXXXXX?text=score" ...>Send me score on WhatsApp</a>
    -->
    <div class="info-box">
        <h3>🤖 WhatsApp Score Bot</h3>
        <p>Want live scores straight in WhatsApp? The score bot is available — contact us to get added to the broadcast list!</p>
    </div>

    <!-- BEGIN AADS AD UNIT 2429792 -->
    <div id="frame" style="width: 100%;margin: auto;position: relative; z-index: 99998;">
        <iframe data-aa='2429792' src='//acceptable.a-ads.com/2429792/?size=Adaptive'
            style='border:0; padding:0; width:70%; height:auto; overflow:hidden;display: block;margin: auto'></iframe>
    </div>
    <!-- END AADS AD UNIT 2429792 -->

</div>

<footer>
    <p>Data sourced from ESPN Cricinfo · CricScore Pro © 2026</p>
</footer>

<script>
    async function fetchScore() {
        try {
            const res = await fetch('/api/score');
            const data = await res.json();
            renderScore(data);
        } catch (e) {
            document.getElementById('scorecard').innerHTML = `
                <div class="card" style="text-align:center; color:var(--dim); padding:30px;">
                    ⚠️ Could not load scores. Please refresh.
                </div>`;
        }
    }

    function renderScore(data) {
        const sc = document.getElementById('scorecard');
        const upSection = document.getElementById('upcoming-section');
        const upList = document.getElementById('upcoming-list');

        if (!data.success || !data.featured) {
            sc.innerHTML = `<div class="card" style="text-align:center; color:var(--dim); padding:30px;">No matches available right now.</div>`;
            return;
        }

        const m = data.featured;
        const logo1 = m.team1.logo || '';
        const logo2 = m.team2.logo || '';

        let badge = '';
        if (m.state === 'in') badge = `<div class="badge live"><div class="live-dot"></div>Live Now</div>`;
        else if (m.state === 'pre') badge = `<div class="badge upcoming">Upcoming</div>`;
        else badge = `<div class="badge completed">Completed</div>`;

        let playersHtml = '';
        if (m.players && m.players.length > 0) {
            playersHtml = `<div class="players-box">` +
                m.players.map(p => `<div>${p.role}: <strong>${p.name}</strong></div>`).join('') +
                `</div>`;
        }

        sc.innerHTML = `
            <div class="card">
                ${badge}
                <div class="league-name">${m.league}</div>
                <div class="match-name">${m.matchName}</div>
                <div class="match-desc">${m.description}</div>
                <div class="teams">
                    <div class="team-row ${m.team1.isWinner ? 'winner' : ''}">
                        <div class="team-left">
                            ${logo1 ? `<img src="${logo1}" class="team-logo" onerror="this.style.display='none'">` : ''}
                            <span class="team-abbr">${m.team1.name}</span>
                        </div>
                        <div class="team-score">${m.team1.score}</div>
                    </div>
                    <div class="team-row ${m.team2.isWinner ? 'winner' : ''}">
                        <div class="team-left">
                            ${logo2 ? `<img src="${logo2}" class="team-logo" onerror="this.style.display='none'">` : ''}
                            <span class="team-abbr">${m.team2.name}</span>
                        </div>
                        <div class="team-score">${m.team2.score}</div>
                    </div>
                </div>
                ${playersHtml}
                <div class="match-status">${m.status}</div>
            </div>`;

        if (data.upcoming && data.upcoming.length > 0) {
            upSection.style.display = 'block';
            upList.innerHTML = data.upcoming.map(u => `
                <div class="upcoming-card">
                    <div class="upcoming-league">${u.league}</div>
                    <div class="upcoming-name">${u.matchName}</div>
                    <div class="upcoming-status">${u.status}</div>
                </div>`).join('');
        }
    }

    fetchScore();
    setInterval(fetchScore, 30000);
</script>
</body>
</html>
